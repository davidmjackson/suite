<!-- Favicon: glyph-sight-sm geometry, inlined. A favicon cannot <use> an external
     sprite, so this is a hand copy of shared/theme/glyphs.svg#glyph-sight-sm and
     must be updated by hand if that symbol changes.

     The -sm variant (no seeds) is deliberate: at 16px the seeds turn to mud.

     Colours are hardcoded because this file sits outside the theme and gets no
     token inheritance. #c22630 is --melon, oklch(0.53 0.19 24), converted exactly.
     (BUILD-SPEC §5.2 says #8f2f22; that is a bad approximation — it is a browner,
     darker red than the token and would not match the page. Verified against
     known oklch/sRGB landmarks.) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <path d="M2.5 8.5h19a9.5 9.5 0 0 1-19 0z" fill="#c22630" opacity="0.42"/>
  <path d="M2.5 8.5h19a9.5 9.5 0 0 1-19 0z" stroke="#c22630" stroke-width="2.2" stroke-linejoin="round"/>
</svg>
