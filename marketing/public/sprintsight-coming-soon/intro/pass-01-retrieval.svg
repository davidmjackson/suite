<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 220" role="img" aria-label="Four delivery sources — Jira, Confluence, Slack and the RAID log — converge into a single indexed stack of artifacts, each keeping the id it will later be cited by.">
  <style>
    svg{
      --ink:oklch(0.235 0.013 250); --soft:oklch(0.455 0.012 250); --faint:oklch(0.6 0.01 250);
      --line:oklch(0.9 0.006 250); --line2:oklch(0.84 0.008 250);
      --panel:oklch(0.996 0.002 240); --bone:oklch(0.964 0.004 240);
      --accent:oklch(0.5 0.1 262);
    }
    .p{fill:var(--panel)} .b{fill:var(--bone)} .ink{fill:var(--ink)} .ac{fill:var(--accent)}
    .gr{fill:var(--line)} .mut{fill:var(--faint)} .wht{fill:#fff}
    .sl{stroke:var(--line2)} .sf{stroke:var(--faint)}
    text{font-family:'IBM Plex Mono',ui-monospace,monospace;fill:var(--ink)}
  </style>
  <g font-size="11">
    <rect class="p sl" x="20" y="24" width="108" height="30" rx="8" stroke-width="1"/><rect class="ac" x="30" y="33" width="12" height="12" rx="3"/><text x="50" y="43">Jira</text>
    <rect class="p sl" x="20" y="64" width="108" height="30" rx="8" stroke-width="1"/><rect class="ac" x="30" y="73" width="12" height="12" rx="3"/><text x="50" y="83">Confluence</text>
    <rect class="p sl" x="20" y="104" width="108" height="30" rx="8" stroke-width="1"/><rect class="ac" x="30" y="113" width="12" height="12" rx="3"/><text x="50" y="123">Slack</text>
    <rect class="p sl" x="20" y="144" width="108" height="30" rx="8" stroke-width="1"/><rect class="ac" x="30" y="153" width="12" height="12" rx="3"/><text x="50" y="163">RAID</text>
  </g>
  <g fill="none" class="sf" stroke-width="1.4" opacity="0.7">
    <path d="M128 39 C158 39 166 99 196 99"/><path d="M128 79 C154 79 172 99 196 99"/>
    <path d="M128 119 C154 119 172 99 196 99"/><path d="M128 159 C158 159 166 99 196 99"/>
  </g>
  <circle class="ink" cx="196" cy="99" r="4"/>
  <g>
    <rect class="b sl" x="240" y="52" width="80" height="58" rx="9" stroke-width="1"/>
    <rect class="b sl" x="234" y="62" width="80" height="58" rx="9" stroke-width="1"/>
    <rect class="p sl" x="228" y="72" width="86" height="62" rx="9" stroke-width="1"/>
    <rect class="ac" x="238" y="82" width="40" height="15" rx="5"/><text class="wht" x="243" y="93" font-size="9">#s15</text>
    <rect class="gr" x="238" y="106" width="66" height="5" rx="2.5"/><rect class="gr" x="238" y="116" width="52" height="5" rx="2.5"/>
  </g>
  <text class="mut" x="228" y="150" font-size="10">indexed · id-tagged</text>
</svg>
