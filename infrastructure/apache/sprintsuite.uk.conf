# sprintsuite.uk :443 — REFERENCE MIRROR of the live IONOS vhost.
#
# ⚠ THE LIVE FILE IS AUTHORITATIVE, NOT THIS ONE.
#    Live: /etc/apache2/sites-enabled/sprintsuite-le-ssl.conf on 194.164.124.172.
#    Nothing applies this file. It exists so the config can be rebuilt and
#    reviewed, and so the rules below are not discoverable only as prose in a
#    README. This project has been bitten by live-vs-repo config drift before —
#    if you change one, change both, and verify with the smoke check at the end.
#
# WHY THIS FILE EXISTS AT ALL:
#    The hub's landing page has a tile linking to /sprintsight-coming-soon/intro/.
#    That page is served by Apache from marketing/public — NOT by the hub. Without
#    the two rules below, the link lands on the hub's 404 and every test in the
#    repo still passes, because no unit test can see an Apache vhost. The tile is
#    the flagship of the app grid; it failing silently is the whole risk.
#
# Deployed and verified 2026-07-17. Backup of the pre-change file: /root/sprintsuite-vhost.bak

<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName sprintsuite.uk
    ServerAlias www.sprintsuite.uk

    ProxyPreserveHost On
    ProxyRequests Off

    # mod_proxy_http auto-sets X-Forwarded-For and X-Forwarded-Host;
    # X-Forwarded-Proto is not, so we set it explicitly so the hub sees the
    # real scheme behind the proxy.
    RequestHeader set X-Forwarded-Proto "http"

    # --- Sprintsight coming-soon page (static, served from marketing/public) ---
    #
    # ORDER IS LOAD-BEARING. Both lines must sit ABOVE the catch-all ProxyPass /
    # below. Apache matches ProxyPass rules in order and takes the first hit, so
    # without the `!` exclusion the hub's catch-all swallows the path and the
    # Alias never runs.
    #
    # Aliased at /intro rather than the parent on purpose: the parent
    # /sprintsight-coming-soon/ then falls through to the hub's 404 instead of
    # serving a directory listing (apache2.conf grants /var/www/ `Options Indexes`).
    #
    # No <Directory> block needed — apache2.conf already has `Require all granted`
    # for /var/www/.
    #
    # NOTE: the page also requests /css/instrument-core.css, /illos/glyphs.svg and
    # /fonts/* absolutely, which the HUB serves. They are byte-identical across
    # surfaces (check-theme-drift.mjs guarantees it), so this is correct — but it
    # means the promo page loses its styling if the hub is down.
    ProxyPass /sprintsight-coming-soon/intro !
    Alias /sprintsight-coming-soon/intro /var/www/suite/marketing/public/sprintsight-coming-soon/intro

    ProxyPass        / http://127.0.0.1:3004/
    ProxyPassReverse / http://127.0.0.1:3004/

    # Hub form posts are tiny; cap at 256KB to keep abuse footprint low.
    LimitRequestBody 262144

    ErrorLog  ${APACHE_LOG_DIR}/sprintsuite-error.log
    CustomLog ${APACHE_LOG_DIR}/sprintsuite-access.log combined

Include /etc/letsencrypt/options-ssl-apache.conf
SSLCertificateFile /etc/letsencrypt/live/sprintsuite.uk/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/sprintsuite.uk/privkey.pem
</VirtualHost>
</IfModule>

# --- SMOKE CHECK (run on prod after any deploy that touches this vhost) ---
#
#   bash /var/www/suite/infrastructure/smoke-sprintsuite.sh
#
# It is the only thing that can catch a missing Alias. The hub's test suite
# cannot: it never sees Apache, and landing-assets.test.js skips this href
# because its regex requires a file extension and the URL ends in a slash.
