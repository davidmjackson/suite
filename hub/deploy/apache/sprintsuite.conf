# Apache reverse proxy for the Sprint Suite hub — sprintsuite.uk
#
# Enable required modules first:
#   sudo a2enmod proxy proxy_http headers ssl rewrite
#
# Hub binds to 127.0.0.1:3004 (only reachable from this box). Apache
# terminates TLS and forwards inside the loopback.

<VirtualHost *:80>
    ServerName sprintsuite.uk
    ServerAlias www.sprintsuite.uk

    # After certbot is run for sprintsuite.uk, uncomment these two lines to
    # redirect all plain HTTP to HTTPS. Leave them commented during the
    # initial certbot challenge.
    # RewriteEngine On
    # RewriteRule ^/?(.*) https://sprintsuite.uk/$1 [R=301,L]

    ProxyPreserveHost On
    ProxyRequests Off

    # mod_proxy_http auto-sets X-Forwarded-For and X-Forwarded-Host;
    # X-Forwarded-Proto is not, so we set it explicitly so the hub sees the
    # real scheme behind the proxy.
    RequestHeader set X-Forwarded-Proto "http"

    ProxyPass        / http://127.0.0.1:3004/
    ProxyPassReverse / http://127.0.0.1:3004/

    # Hub form posts are tiny; cap at 256KB to keep abuse footprint low.
    LimitRequestBody 262144

    ErrorLog  ${APACHE_LOG_DIR}/sprintsuite-error.log
    CustomLog ${APACHE_LOG_DIR}/sprintsuite-access.log combined
</VirtualHost>

# ----------------------------------------------------------------------------
# HTTPS vhost — uncomment after certbot has issued the certificate.
# Run once with the HTTP vhost above unchanged:
#   sudo certbot --apache -d sprintsuite.uk -d www.sprintsuite.uk
# certbot will auto-rewrite this file or generate a sibling. If you prefer to
# manage it manually, uncomment the block below and reload Apache.
# ----------------------------------------------------------------------------

